services:
  gateway:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_NAME: ${APP_NAME:-InferHub}
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_VERSION: ${API_VERSION:-v1}
      API_KEY_PEPPER: ${API_KEY_PEPPER:-change-me-in-local-dev}
      DEFAULT_FREE_RPM: ${DEFAULT_FREE_RPM:-30}
      DEFAULT_ENTERPRISE_RPM: ${DEFAULT_ENTERPRISE_RPM:-600}
      DEFAULT_ADMIN_RPM: ${DEFAULT_ADMIN_RPM:-1200}
      REQUEST_BODY_LIMIT_BYTES: ${REQUEST_BODY_LIMIT_BYTES:-10485760}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-inferhub}
      POSTGRES_USER: ${POSTGRES_USER:-inferhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inferhub}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:-clickhouse}
      CLICKHOUSE_PORT: ${CLICKHOUSE_PORT:-8123}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-inferhub}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-inferhub}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-inferhub}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com}
      GROQ_TIMEOUT_SECONDS: ${GROQ_TIMEOUT_SECONDS:-30}
      LLM_WORKER_TARGET: ${LLM_WORKER_TARGET:-llm-worker:50051}
      ASR_WORKER_TARGET: ${ASR_WORKER_TARGET:-asr-worker:50052}
      TTS_WORKER_TARGET: ${TTS_WORKER_TARGET:-tts-worker:50053}
      VISION_WORKER_TARGET: ${VISION_WORKER_TARGET:-vision-worker:50054}
      GRPC_TIMEOUT_SECONDS: ${GRPC_TIMEOUT_SECONDS:-30}
      WEBSOCKET_PRESENCE_TTL_SECONDS: ${WEBSOCKET_PRESENCE_TTL_SECONDS:-45}
      FLOCI_ENDPOINT_URL: ${FLOCI_ENDPOINT_URL:-http://floci:4566}
      FLOCI_REGION: ${FLOCI_REGION:-us-east-1}
      FLOCI_ACCESS_KEY_ID: ${FLOCI_ACCESS_KEY_ID:-inferhub}
      FLOCI_SECRET_ACCESS_KEY: ${FLOCI_SECRET_ACCESS_KEY:-inferhub-local}
      S3_BUCKET_MODEL_ARTIFACTS: ${S3_BUCKET_MODEL_ARTIFACTS:-inferhub-model-artifacts}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_healthy
      llm-worker:
        condition: service_healthy
      asr-worker:
        condition: service_healthy
      tts-worker:
        condition: service_healthy
      vision-worker:
        condition: service_healthy

  llm-worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
    environment:
      WORKER_NAME: llm-worker
      WORKER_KIND: llm
      GRPC_PORT: 50051
      HEALTH_PORT: 8090
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com}
      GROQ_TIMEOUT_SECONDS: ${GROQ_TIMEOUT_SECONDS:-30}
      GROQ_MAX_RETRIES: ${GROQ_MAX_RETRIES:-2}
    ports:
      - "50051:50051"
      - "8091:8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  asr-worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
    environment:
      WORKER_NAME: asr-worker
      WORKER_KIND: asr
      GRPC_PORT: 50052
      HEALTH_PORT: 8090
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com}
      GROQ_TIMEOUT_SECONDS: ${GROQ_TIMEOUT_SECONDS:-30}
      GROQ_MAX_RETRIES: ${GROQ_MAX_RETRIES:-2}
    ports:
      - "50052:50052"
      - "8092:8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  tts-worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
    environment:
      WORKER_NAME: tts-worker
      WORKER_KIND: tts
      GRPC_PORT: 50053
      HEALTH_PORT: 8090
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com}
      GROQ_TIMEOUT_SECONDS: ${GROQ_TIMEOUT_SECONDS:-30}
      GROQ_MAX_RETRIES: ${GROQ_MAX_RETRIES:-2}
    ports:
      - "50053:50053"
      - "8093:8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  vision-worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
    environment:
      WORKER_NAME: vision-worker
      WORKER_KIND: vision
      GRPC_PORT: 50054
      HEALTH_PORT: 8090
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com}
      GROQ_TIMEOUT_SECONDS: ${GROQ_TIMEOUT_SECONDS:-30}
      GROQ_MAX_RETRIES: ${GROQ_MAX_RETRIES:-2}
    ports:
      - "50054:50054"
      - "8094:8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inferhub
      POSTGRES_USER: inferhub
      POSTGRES_PASSWORD: inferhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inferhub -d inferhub"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  clickhouse:
    image: clickhouse/clickhouse-server:24.12-alpine
    environment:
      CLICKHOUSE_DB: inferhub
      CLICKHOUSE_USER: inferhub
      CLICKHOUSE_PASSWORD: inferhub
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/docker/clickhouse:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 30

  kafka:
    image: apache/kafka:3.9.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30

  kafka-init:
    image: apache/kafka:3.9.0
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./infra/docker/kafka/create-topics.sh:/create-topics.sh:ro
    entrypoint: ["/bin/sh", "/create-topics.sh"]

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
  kafka_data:
